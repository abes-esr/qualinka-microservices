name: "buildx-test-pub-spring-cloud-config-server-todockerhub"

env:
  DOCKERHUB_IMAGE_PREFIX: abesesr/qualinka-ms
  DIRECTORY: spring-cloud-config-server

on:
  push:
    paths:
      - 'spring-cloud-config-server/**'
  pull_request:
  workflow_dispatch:

jobs:
# spring-cloud-config-server job
  buildx-test-pubtodockerhub:
    permissions:
      id-token: write
      attestations: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: "Build: checkout source code"
        uses: actions/checkout@v6

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "Push: prepare version from git tags/branchs"
        id: docker_tag_meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_IMAGE_PREFIX }}
          flavor: |
            latest=auto
            suffix=-${{ env.DIRECTORY }}

      - name: "Login to DockerHub"
        uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Buildx and push"
        uses: docker/build-push-action@v7
        with:
          context: ./${{ env.DIRECTORY }}
          file: ./${{ env.DIRECTORY }}/Dockerfile
          push: ${{ github.event_name != 'pull_request'  && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/')) }}
          target: ${{ env.DIRECTORY }}
          tags: ${{ steps.docker_tag_meta.outputs.tags }}